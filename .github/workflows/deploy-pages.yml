name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject build version and SHA
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COUNT=$(git rev-list --count HEAD)
          python3 - "$SHORT_SHA" "$COUNT" <<'PYEOF'
          import sys, pathlib

          sha   = sys.argv[1]
          count = int(sys.argv[2])
          version = f"{1.0 + count * 0.01:.2f}"
          print(f"Injecting: APP_VERSION={version}  BUILD_SHA={sha}  (commit #{count})")

          app = pathlib.Path('app.js').read_text()
          app = app.replace("const APP_VERSION = 'dev'; /* CI_INJECT_VERSION */",
                            f"const APP_VERSION = '{version}'; /* CI_INJECT_VERSION */")
          app = app.replace("const BUILD_SHA = 'dev'; /* CI_INJECT_SHA */",
                            f"const BUILD_SHA = '{sha}'; /* CI_INJECT_SHA */")
          pathlib.Path('app.js').write_text(app)

          sw = pathlib.Path('sw.js').read_text()
          sw = sw.replace("const CACHE_NAME = 'bplog-dev'; /* CI_INJECT_CACHE */",
                          f"const CACHE_NAME = 'bplog-{version}'; /* CI_INJECT_CACHE */")
          pathlib.Path('sw.js').write_text(sw)

          app_out = pathlib.Path('app.js').read_text()
          sw_out  = pathlib.Path('sw.js').read_text()
          assert f"APP_VERSION = '{version}'" in app_out,       "FAIL: APP_VERSION not injected"
          assert f"BUILD_SHA = '{sha}'"       in app_out,       "FAIL: BUILD_SHA not injected"
          assert f"CACHE_NAME = 'bplog-{version}'" in sw_out,   "FAIL: CACHE_NAME not injected"
          print("All injections verified.")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
