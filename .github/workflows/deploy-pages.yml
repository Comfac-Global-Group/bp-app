name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject build version and SHA
        run: |
          SHA="${{ github.sha }}"
          COUNT=$(git rev-list --count HEAD)
          VERSION=$(awk "BEGIN {printf \"%.2f\", 1.00 + $COUNT * 0.01}")
          sed -i "s/const APP_VERSION = 'dev'; \/\/ Injected by CI during deployment/const APP_VERSION = '$VERSION';\/\/ Injected by CI/" app.js
          sed -i "s/const BUILD_SHA = 'dev';   \/\/ Injected by CI during deployment/const BUILD_SHA = '${SHA:0:7}';  \/\/ Injected by CI/" app.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
