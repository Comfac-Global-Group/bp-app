<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Browser Test — Outlier Techniques</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background: #f5f7fa; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; font-size: 12px; border-radius: 6px; }
    .result { margin: 15px 0; padding: 15px; border-radius: 10px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .fail { border-left: 4px solid #e74c3c; }
    .partial { border-left: 4px solid #f39c12; }
    .success { border-left: 4px solid #27ae60; }
    canvas { max-width: 100%; border: 1px solid #ccc; border-radius: 6px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    .engine-tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
    .tag-tess { background: #e3f2fd; color: #1565c0; }
    .tag-ocrad { background: #fff3e0; color: #e65100; }
    .numbers { font-family: monospace; font-size: 13px; }
    .perfect { color: #27ae60; font-weight: 700; }
    .missing { color: #e74c3c; }
    #loading { text-align: center; padding: 40px; color: #666; }
    .preview-small { max-width: 200px; max-height: 150px; }
  </style>
</head>
<body>
  <h1>🔬 OCR Outlier Techniques Test</h1>
  <div class="subtitle">Target: SYS=118, DIA=78, PULSE=59 | Testing rotate90, contrast, threshold, crop, and combinations</div>
  
  <div id="loading">Loading OCR engines…</div>
  <div id="output" style="display:none"></div>
  
  <!-- ocrad.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/ocrad.js@0.0.2/ocrad.min.js"></script>
  
  <script>
    const output = document.getElementById('output');
    const loading = document.getElementById('loading');
    
    function extractNumbers(text) {
      const nums = text.match(/\b\d{2,3}\b/g) || [];
      return nums.map(Number);
    }
    
    function evaluate(nums) {
      const has118 = nums.includes(118);
      const has78 = nums.includes(78);
      const has59 = nums.includes(59);
      return { 
        perfect: has118 && has78 && has59, 
        has118, has78, has59, 
        count: [has118, has78, has59].filter(Boolean).length,
        nums 
      };
    }
    
    function runAlgos(text) {
      const nums = extractNumbers(text);
      const sysCands = nums.filter(n => n >= 90 && n <= 220).sort((a, b) => b - a);
      const diaCands = nums.filter(n => n >= 50 && n <= 130).sort((a, b) => b - a);
      
      // Label proximity
      const sysLbl = text.match(/SYS[^\d]*(\d{2,3})/i) || text.match(/(\d{2,3})[^\d]{0,20}SYS/i);
      const diaLbl = text.match(/DIA[^\d]*(\d{2,3})/i) || text.match(/(\d{2,3})[^\d]{0,20}DIA/i);
      const pulseLbl = text.match(/PULSE[^\d]*(\d{2,3})/i) || text.match(/(?:Pulse|\/min)[^\d]*(\d{2,3})/i);
      
      const algos = [];
      if (sysLbl && diaLbl) algos.push({ name: 'Label', sys: +sysLbl[1], dia: +diaLbl[1], hr: pulseLbl ? +pulseLbl[1] : null });
      
      // Range + PP
      for (const sys of sysCands) {
        for (const dia of diaCands.filter(n => n < sys)) {
          if (sys - dia >= 20 && sys - dia <= 100) {
            const hr = nums.find(n => n >= 40 && n <= 180 && n !== sys && n !== dia);
            algos.push({ name: 'Range+PP', sys, dia, hr: hr || null });
            break;
          }
        }
        if (algos.find(a => a.name === 'Range+PP')) break;
      }
      
      // Range only
      if (sysCands.length && diaCands.length) {
        const hr = nums.find(n => n >= 40 && n <= 180 && n !== sysCands[0] && n !== diaCands[0]);
        algos.push({ name: 'Range', sys: sysCands[0], dia: diaCands[0], hr: hr || null });
      }
      
      return algos;
    }
    
    function preprocess(canvas, type) {
      const w = canvas.width, h = canvas.height;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        let v = gray;
        if (type === 'contrast') v = Math.max(0, Math.min(255, ((gray - 128) * 2.5) + 128));
        if (type === 'threshold') v = gray > 128 ? 255 : 0;
        if (type === 'inverted') v = 255 - gray;
        if (type === 'normalize') {
          // Simple auto-contrast
          v = Math.max(0, Math.min(255, ((gray - 50) / 150) * 255));
        }
        d[i] = d[i+1] = d[i+2] = v;
      }
      
      if (type !== 'original') ctx.putImageData(imgData, 0, 0);
      return canvas;
    }
    
    async function testTesseract(canvas, variant) {
      if (typeof Tesseract === 'undefined') return { engine: 'Tesseract.js', variant, error: 'Not loaded' };
      try {
        const result = await Tesseract.recognize(canvas, 'eng', {
          logger: () => {},
          errorHandler: () => {},
          tessedit_char_whitelist: '0123456789'
        });
        const ev = evaluate(extractNumbers(result.data.text));
        return { engine: 'Tesseract.js', variant, text: result.data.text, confidence: result.data.confidence, ...ev };
      } catch (err) {
        return { engine: 'Tesseract.js', variant, error: err.message };
      }
    }
    
    function testOcrad(canvas, variant) {
      if (typeof OCRAD === 'undefined') return { engine: 'ocrad.js', variant, error: 'Not loaded' };
      try {
        const text = OCRAD(canvas);
        const ev = evaluate(extractNumbers(text));
        return { engine: 'ocrad.js', variant, text, ...ev };
      } catch (err) {
        return { engine: 'ocrad.js', variant, error: err.message };
      }
    }
    
    function rotateCanvas(sourceCanvas, degrees) {
      const swap = degrees === 90 || degrees === 270;
      const w = swap ? sourceCanvas.height : sourceCanvas.width;
      const h = swap ? sourceCanvas.width : sourceCanvas.height;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.translate(w / 2, h / 2);
      ctx.rotate((degrees * Math.PI) / 180);
      ctx.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);
      return canvas;
    }
    
    function cropCanvas(sourceCanvas) {
      const w = sourceCanvas.width, h = sourceCanvas.height;
      const canvas = document.createElement('canvas');
      canvas.width = Math.floor(w * 0.55);
      canvas.height = Math.floor(h * 0.60);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(sourceCanvas, -Math.floor(w * 0.25), -Math.floor(h * 0.20));
      return canvas;
    }
    
    async function runTests() {
      loading.style.display = 'none';
      output.style.display = 'block';
      
      // Load source image
      const img = new Image();
      img.src = '20260414_112450.jpg';
      await new Promise(r => img.onload = r);
      
      const variants = [
        { name: 'original', desc: 'Original', fn: c => c },
        { name: 'contrast', desc: 'Contrast 2.5x', fn: c => preprocess(c, 'contrast') },
        { name: 'threshold', desc: 'Threshold @ 128', fn: c => preprocess(c, 'threshold') },
        { name: 'inverted', desc: 'Inverted', fn: c => preprocess(c, 'inverted') },
        { name: 'normalize', desc: 'Auto-contrast', fn: c => preprocess(c, 'normalize') },
        { name: 'rotate90', desc: 'Rotate 90°', fn: c => rotateCanvas(c, 90) },
        { name: 'rotate90_contrast', desc: 'Rotate 90° + contrast', fn: c => rotateCanvas(preprocess(c, 'contrast'), 90) },
        { name: 'rotate90_threshold', desc: 'Rotate 90° + threshold', fn: c => rotateCanvas(preprocess(c, 'threshold'), 90) },
        { name: 'crop_lcd', desc: 'Crop to LCD', fn: c => cropCanvas(c) },
        { name: 'crop_lcd_contrast', desc: 'Crop + contrast', fn: c => cropCanvas(preprocess(c, 'contrast')) },
        { name: 'crop_lcd_threshold', desc: 'Crop + threshold', fn: c => cropCanvas(preprocess(c, 'threshold')) },
        { name: 'crop_rotate90', desc: 'Crop + rotate 90°', fn: c => rotateCanvas(cropCanvas(c), 90) },
        { name: 'scale2x', desc: '2x upscale', fn: c => {
          const nc = document.createElement('canvas');
          nc.width = c.width * 2; nc.height = c.height * 2;
          nc.getContext('2d').drawImage(c, 0, 0, nc.width, nc.height);
          return nc;
        }},
        { name: 'scale2x_threshold', desc: '2x + threshold', fn: c => {
          const nc = document.createElement('canvas');
          nc.width = c.width * 2; nc.height = c.height * 2;
          nc.getContext('2d').drawImage(c, 0, 0, nc.width, nc.height);
          return preprocess(nc, 'threshold');
        }},
      ];
      
      let html = '';
      let perfectCount = 0;
      
      for (const variant of variants) {
        // Create base canvas
        const baseCanvas = document.createElement('canvas');
        baseCanvas.width = img.naturalWidth;
        baseCanvas.height = img.naturalHeight;
        baseCanvas.getContext('2d').drawImage(img, 0, 0);
        
        // Apply preprocessing
        const processedCanvas = variant.fn(baseCanvas);
        
        // Run OCR
        const tResult = await testTesseract(processedCanvas, variant.name);
        const oResult = testOcrad(processedCanvas, variant.name);
        
        const tEv = evaluate(extractNumbers(tResult.text || ''));
        const oEv = evaluate(extractNumbers(oResult.text || ''));
        
        const best = tEv.count >= oEv.count ? tResult : oResult;
        const bestEv = tEv.count >= oEv.count ? tEv : oEv;
        const status = bestEv.perfect ? 'success' : bestEv.count > 0 ? 'partial' : 'fail';
        
        if (bestEv.perfect) perfectCount++;
        
        html += `<div class="result ${status}">`;
        html += `<h3>${variant.desc} <span style="font-size:12px;color:#666">(${variant.name})</span></h3>`;
        html += `<canvas class="preview-small" style="display:block;margin:8px 0;" id="preview-${variant.name}"></canvas>`;
        
        // Tesseract
        html += `<div><span class="engine-tag tag-tess">Tesseract.js</span> `;
        if (tResult.error) {
          html += `<span class="missing">Error: ${tResult.error}</span>`;
        } else {
          html += `<span class="numbers">${tEv.perfect ? '<span class="perfect">✅ PERFECT</span>' : `nums: ${JSON.stringify(tEv.nums.slice(0, 8))}`}</span>`;
          const algos = runAlgos(tResult.text);
          const bestAlgo = algos.find(a => a.sys && a.dia);
          if (bestAlgo) html += `<br><small>Best algo: ${bestAlgo.name} → ${bestAlgo.sys}/${bestAlgo.dia} HR:${bestAlgo.hr}</small>`;
        }
        html += `</div>`;
        
        // ocrad
        html += `<div style="margin-top:8px"><span class="engine-tag tag-ocrad">ocrad.js</span> `;
        if (oResult.error) {
          html += `<span class="missing">Error: ${oResult.error}</span>`;
        } else {
          html += `<span class="numbers">${oEv.perfect ? '<span class="perfect">✅ PERFECT</span>' : `nums: ${JSON.stringify(oEv.nums.slice(0, 8))}`}</span>`;
          const algos = runAlgos(oResult.text);
          const bestAlgo = algos.find(a => a.sys && a.dia);
          if (bestAlgo) html += `<br><small>Best algo: ${bestAlgo.name} → ${bestAlgo.sys}/${bestAlgo.dia} HR:${bestAlgo.hr}</small>`;
        }
        html += `</div>`;
        
        html += `</div>`;
        
        // Store canvas for preview
        setTimeout(() => {
          const preview = document.getElementById(`preview-${variant.name}`);
          if (preview) {
            preview.width = Math.min(processedCanvas.width, 300);
            preview.height = Math.min(processedCanvas.height, 225);
            preview.getContext('2d').drawImage(processedCanvas, 0, 0, preview.width, preview.height);
          }
        }, 0);
      }
      
      html += `<div class="result ${perfectCount ? 'success' : 'fail'}">`;
      html += `<h2>Summary</h2>`;
      html += `<p>${perfectCount ? `✅ ${perfectCount} perfect extraction(s) found!` : '❌ No perfect extractions across all techniques.'}</p>`;
      html += `<p class="text-muted">Rotate 90° was the winning technique for Gemma 4 vision model, but traditional OCR engines (tesseract.js, ocrad.js) still struggle with 7-segment LCD displays.</p>`;
      html += `</div>`;
      
      output.innerHTML = html;
    }
    
    // Load Tesseract.js
    const tScript = document.createElement('script');
    tScript.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    tScript.onload = runTests;
    document.head.appendChild(tScript);
  </script>
</body>
</html>
